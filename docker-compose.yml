services:
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
  exchange:
    build:
      context: .
      dockerfile: exchange/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
  bidder:
    build:
      context: .
      dockerfile: bidder/Dockerfile
    ports:
      - "8080:8080"
  banker:
    build:
      context: .
      dockerfile: banker/Dockerfile
    ports:
      - "8080:8080"
  redis:
    image: redis:8-alpine
    command: ["redis-server", "--notify-keyspace-events", "Ex"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"